services:
  binge-client:
    build:
      context: ../client
      args:
        NEXT_PUBLIC_SERVER_URL: ${PUBLIC_URL:?Set PUBLIC_URL to the public HTTPS backend origin}
        NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL:?Set NEXT_PUBLIC_TURN_URL to your TURN relay URL}
        NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME:?Set NEXT_PUBLIC_TURN_USERNAME to a real TURN user}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL:?Set NEXT_PUBLIC_TURN_CREDENTIAL to a real TURN password}
        NEXT_PUBLIC_ICE_SERVERS: ${NEXT_PUBLIC_ICE_SERVERS:-}
        NEXT_PUBLIC_STREAM_RELAY_VIDEO_BITRATE: ${NEXT_PUBLIC_STREAM_RELAY_VIDEO_BITRATE:-8000000}
    restart: unless-stopped
    expose:
      - "3000"

  binge-server:
    build:
      context: ../server
    restart: unless-stopped
    environment:
      PORT: 3002
      HOST: 0.0.0.0
      PUBLIC_URL: ${PUBLIC_URL:?Set PUBLIC_URL to the public HTTPS backend origin}
      PUBLIC_PROTOCOL: https
      PUBLIC_PORT: 443
      UPLOAD_DIR: /data/uploads
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN to the public app origin}
      MAX_ROOM_USERS: ${MAX_ROOM_USERS:-8}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-8589934592}
      SOCKET_MAX_HTTP_BUFFER_SIZE: ${SOCKET_MAX_HTTP_BUFFER_SIZE:-100000000}
      NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL:?Set NEXT_PUBLIC_TURN_URL to your TURN relay URL}
      NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME:?Set NEXT_PUBLIC_TURN_USERNAME to a real TURN user}
      NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL:?Set NEXT_PUBLIC_TURN_CREDENTIAL to a real TURN password}
    expose:
      - "3002"
    volumes:
      - binge_uploads:/data/uploads

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - binge-client
      - binge-server
    environment:
      PUBLIC_APP_HOST: ${PUBLIC_APP_HOST:?Set PUBLIC_APP_HOST, for example app.example.com}
      PUBLIC_BACKEND_HOST: ${PUBLIC_BACKEND_HOST:?Set PUBLIC_BACKEND_HOST, for example sync.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49160
      - --max-port=49200
      - --realm=${TURN_REALM:?Set TURN_REALM to your TURN domain}
      - --server-name=${TURN_REALM:?Set TURN_REALM to your TURN domain}
      - --user=${NEXT_PUBLIC_TURN_USERNAME:?Set NEXT_PUBLIC_TURN_USERNAME}:${NEXT_PUBLIC_TURN_CREDENTIAL:?Set NEXT_PUBLIC_TURN_CREDENTIAL}
      - --fingerprint
      - --lt-cred-mech
      - --no-cli
      - --no-multicast-peers
      - --no-tlsv1
      - --no-tlsv1_1

volumes:
  binge_uploads:
  caddy_data:
  caddy_config:
